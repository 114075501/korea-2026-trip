        .timeline-line { position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #e5e7eb; z-index: 0; }

        .comic-border { border: 2px solid #1f2937; box-shadow: 3px 3px 0px 0px #1f2937; }
        .cursor-zoom-in { cursor: zoom-in; }

        /* 地鐵標籤 Pill */
        .line-pill { padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 800; color: white; display: inline-flex; align-items: center; }
        .station-pill { padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; background: #f3f4f6; color: #4b5563; border: 1px solid #e5e7eb; display: inline-flex; align-items: center; }

        /* 虎航機票樣式 */
        .ticket { background: white; border-radius: 20px; position: relative; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border-left: 10px solid var(--tiger-yellow); margin-bottom: 24px; }
        .ticket::before, .ticket::after { content: ""; position: absolute; left: -12px; width: 24px; height: 24px; background: #f3f4f6; border-radius: 50%; z-index: 5; }
        .ticket::before { top: 35px; }
        .ticket-header { background: #000; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .ticket-body { padding: 25px 20px; position: relative; }

        .pnr-tag { background: var(--tiger-yellow); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: 900; font-family: monospace; }
