                    return `<li class="flex items-start" style="${isRed ? 'color:red; font-weight:bold;' : 'text-xs text-amber-800'}"><i class="fas fa-stopwatch mt-1 mr-2 text-amber-400"></i>${r}</li>`;
                }).join('')}</ul></div>`;
                dayData.events.forEach((event) => {
                    const currentImg = window.appState.imageOverrides[event.id] || event.img;
                    let subwayTagsHtml = '';
                    if (event.lines) {
                        event.lines.forEach(line => { subwayTagsHtml += `<span class="line-pill mr-1" style="background:${subwayColors[line] || "#9ca3af"}">${line}</span>`; });
                        if (event.station) subwayTagsHtml += `<span class="station-pill">${event.station}</span>`;
                    }
                    html += `<div class="relative pl-10"><div class="absolute left-[12px] top-1 w-4 h-4 rounded-full bg-blue-500 border-4 border-white z-10 shadow-sm"></div><div class="spot-card border flex flex-col"><div class="h-44 relative group"><img src="${currentImg}" class="w-full h-full object-cover cursor-zoom-in" onclick="window.openImage('${currentImg}')" onerror="this.src='https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?q=80&w=800'"><label class="change-img-btn"><i class="fas fa-camera"></i>更換圖片<input type="file" class="hidden" onchange="window.handleUpload(this, '${event.id}')"></label></div><div class="p-4"><div class="flex justify-between items-start mb-2"><h3 class="text-md font-bold text-gray-900 leading-tight">${event.title}</h3>${event.map ? `<a href="${event.map}" target="_blank" class="bg-emerald-50 text-emerald-700 px-2 py-1 rounded-lg text-[10px] font-bold border border-emerald-100">地圖</a>` : ''}</div><div class="flex flex-wrap items-center gap-1 mb-3"><span class="text-[11px] font-bold bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full"><i class="fas fa-clock mr-1"></i>${event.time}</span>${event.stay ? `<span class="text-[11px] font-bold bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full mr-1">停留：${event.stay}</span>` : ''}${subwayTagsHtml}</div>${event.exit ? `<div class="bg-indigo-50 p-2 rounded-xl mb-3 text-[11px] text-indigo-700 font-bold flex items-center"><i class="fas fa-map-marker-alt mr-2 text-indigo-400"></i>${event.exit}</div>` : ''}<div class="bg-gray-50 p-3 rounded-xl text-xs text-gray-700 leading-relaxed">${event.note}</div></div></div></div>`;
                });
                content.innerHTML = html;
            }
        };

        window.showDay = (dayNum) => {
            window.appState.currentDay = dayNum; window.appState.currentSubTab = 'itinerary';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`tab${dayNum}`).classList.add('tab-active');
            document.getElementById('subTabContainer').style.display = (dayNum === 1 || dayNum === 5) ? 'flex' : 'none';
            window.renderContent(); window.scrollTo({ top: 0, behavior: 'smooth' });
            const tabs = document.getElementById('dayTabs'); const activeTab = document.getElementById(`tab${dayNum}`);
            if (activeTab) { const scrollLeft = activeTab.offsetLeft - (tabs.offsetWidth / 2) + (activeTab.offsetWidth / 2); tabs.scrollTo({ left: scrollLeft, behavior: 'smooth' }); }
        };

        window.switchSubTab = (type) => { window.appState.currentSubTab = type; document.querySelectorAll('.sub-tab').forEach(btn => btn.classList.remove('sub-tab-active')); document.getElementById(`subTab-${type}`).classList.add('sub-tab-active'); window.renderContent(); };
        window.toggleModal = (id) => { const modal = document.getElementById(id); const content = document.getElementById(id + 'Content'); if (modal.classList.contains('opacity-0')) { modal.classList.remove('opacity-0', 'pointer-events-none'); content.classList.remove('scale-95'); window.modalOpen = true; } else { modal.classList.add('opacity-0', 'pointer-events-none'); content.classList.add('scale-95'); window.modalOpen = false; } };
        window.openImage = (src) => { const modal = document.getElementById('imageModal'); const img = document.getElementById('modalImg'); img.src = src; modal.classList.remove('opacity-0', 'pointer-events-none'); window.modalOpen = true; };
        window.closeImage = () => { const modal = document.getElementById('imageModal'); modal.classList.add('opacity-0', 'pointer-events-none'); window.modalOpen = false; };

        let touchStartX = 0; let touchEndX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        document.addEventListener('touchend', e => {
            if (window.modalOpen) return;
            touchEndX = e.changedTouches[0].screenX; const threshold = 70; const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > threshold) {
                if (diff > 0 && window.appState.currentDay < 5) window.showDay(window.appState.currentDay + 1);
                else if (diff < 0 && window.appState.currentDay > 0) window.showDay(window.appState.currentDay - 1);
            }
        }, { passive: true });

        window.showDay(0);
    </script>

        const firebaseConfig = {
          apiKey: "AIzaSyCjwIwbJwVI6vy7VOXwuz_ngNcFySgcW78",
          authDomain: "seoul-trip-2026-a715f.firebaseapp.com",

        };

        const MASTER_SYNC_ID = "seoul-2026"; const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app); const syncStatus = document.getElementById('syncStatus');

        window.handleUpload = async (input, spotId) => {
            if (!input.files[0]) return;
            try {
                if (!auth.currentUser) await signInAnonymously(auth);
                syncStatus.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>同步中...';
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = async () => {
                        const canvas = document.createElement('canvas'); let w = img.width; let h = img.height;
                        if (w > 1000) { h *= 1000 / w; w = 1000; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const compressed = canvas.toDataURL('image/jpeg', 0.5);
                        await setDoc(doc(db, MASTER_SYNC_ID, spotId), { data: compressed }, { merge: true });
                        syncStatus.innerHTML = '<i class="fas fa-cloud mr-1"></i>雲端已同步';
                    };
                };
                reader.readAsDataURL(input.files[0]);
            } catch (e) { console.error(e); }
        };

        async function initListener() {
            try {
                await signInAnonymously(auth);
                onSnapshot(collection(db, MASTER_SYNC_ID), (snap) => {
                    const news = {}; snap.forEach(d => { news[d.id] = d.data().data; });
                    window.appState.imageOverrides = news; window.renderContent(); 
                    syncStatus.innerHTML = '<i class="fas fa-cloud mr-1"></i>雲端已同步';
                });
            } catch (e) { console.error(e); }
        }
        initListener();
    </script>
