<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot, collection } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCjwiIwbJvVI6vy7VOXwuz_ngNcFySgcW78",
        authDomain: "seoul-trip-2026-a715f.firebaseapp.com",
        projectId: "seoul-trip-2026-a715f",
        storageBucket: "seoul-trip-2026-a715f.firebasestorage.app",
        messagingSenderId: "1022754455381",
        appId: "1:1022754455381:web:40ab320fe12bd7e97b39dc"
    };

    const MASTER_SYNC_ID = "seoul-2026"; 
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const syncStatus = document.getElementById('syncStatus');

    window.handleUpload = async (input, spotId) => {
        if (!input.files[0]) return;
        
        try {
            // 確保操作前已登入
            if (!auth.currentUser) await signInAnonymously(auth);

            syncStatus.innerText = '正在處理圖片...';
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image(); 
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width; let h = img.height;
                    if (w > 1000) { h *= 1000 / w; w = 1000; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const compressed = canvas.toDataURL('image/jpeg', 0.5);
                    
                    try {
                        await setDoc(doc(db, MASTER_SYNC_ID, spotId), { data: compressed }, { merge: true });
                        syncStatus.innerHTML = '<i class="fas fa-cloud mr-1"></i>雲端已同步';
                    } catch (err) { 
                        alert("寫入失敗：請確認 Firestore 規則已發佈為測試模式");
                        syncStatus.innerText = '同步失敗'; 
                    }
                };
            };
            reader.readAsDataURL(input.files[0]);
        } catch (e) {
            alert("登入失敗：請確認 Firebase Console 已啟用「匿名登入」且已授權 github.io 網域");
        }
    };

    async function initListener() {
        try {
            await signInAnonymously(auth);
            onSnapshot(collection(db, MASTER_SYNC_ID), (snap) => {
                const news = {};
                snap.forEach(d => { news[d.id] = d.data().data; });
                window.appState.imageOverrides = news; 
                window.renderContent(); 
                syncStatus.innerHTML = '<i class="fas fa-cloud mr-1"></i>雲端已同步';
            });
        } catch (e) { console.error("Listener Error:", e); }
    }

    initListener();
</script>
